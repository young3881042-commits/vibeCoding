apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupiter-api
  namespace: jupiter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jupiter-api
  namespace: jupiter
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "pods/exec", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jupiter-api
  namespace: jupiter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jupiter-api
subjects:
  - kind: ServiceAccount
    name: jupiter-api
    namespace: jupiter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jupiter-api-monitoring-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jupiter-api-monitoring-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jupiter-api-monitoring-reader
subjects:
  - kind: ServiceAccount
    name: jupiter-api
    namespace: jupiter
