apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupiter-web
  namespace: jupiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupiter-web
  template:
    metadata:
      labels:
        app: jupiter-web
    spec:
      containers:
        - name: web
          image: jupiter-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              name: http
          env:
            - name: VITE_API_PROXY
              value: http://jupiter-api:8080
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 12
            periodSeconds: 10
            timeoutSeconds: 1
