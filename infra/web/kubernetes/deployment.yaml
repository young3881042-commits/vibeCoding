apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupiter-web
  namespace: jupiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupiter-web
  template:
    metadata:
      labels:
        app: jupiter-web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: jupiter-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              name: http
          envFrom:
            - configMapRef:
                name: jupiter-web-env
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 12
            periodSeconds: 10
            timeoutSeconds: 1
