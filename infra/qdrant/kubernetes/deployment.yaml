apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: jupiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: 192.168.45.101:30500/qdrant/qdrant:v1.11.3
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
