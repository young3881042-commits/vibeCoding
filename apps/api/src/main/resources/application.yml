server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:jupiter_web}
    username: ${DB_USER:jupiter}
    password: ${DB_PASSWORD:jupiter}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: never
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  namespace: ${APP_NAMESPACE:jupiter}
  registry: ${APP_REGISTRY:192.168.45.101:32050}
  base-image: ${APP_BASE_IMAGE:192.168.45.101:32050/jupiter/base:latest}
  jupyter-url: ${APP_JUPYTER_URL:http://192.168.45.101:30888}
  frontend-url: ${APP_FRONTEND_URL:http://192.168.45.101:31088}
  api-url: ${APP_API_URL:http://192.168.45.101:31090/api}
  gateway-url: ${APP_GATEWAY_URL:http://192.168.45.101:31080}
  launcher-url: ${APP_LAUNCHER_URL:https://rancher.192.168.45.101.sslip.io:30443}
  adminer-url: ${APP_ADMINER_URL:http://192.168.45.101:31081}
  nexus-url: ${APP_NEXUS_URL:http://192.168.45.101:30693}
  nexus-username: ${APP_NEXUS_USERNAME:admin}
  nexus-password: ${APP_NEXUS_PASSWORD:}
  kafka-url: ${APP_KAFKA_URL:http://192.168.45.101:31082}
  elk-url: ${APP_ELK_URL:}
  pypi-proxy-url: ${APP_PYPI_PROXY_URL:http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/pypi-proxy/simple}
  pypi-proxy-host: ${APP_PYPI_PROXY_HOST:nexus-nexus-repository-manager.nexus.svc.cluster.local}
  external-host: ${APP_EXTERNAL_HOST:jupiter.example.com}
  notebook-user: ${APP_NOTEBOOK_USER:jovyan}
  mariadb-url: ${APP_MARIADB_URL:mariadb:3306/jupiter_web}
  mariadb-username: ${APP_MARIADB_USERNAME:jupiter}
  mariadb-password: ${APP_MARIADB_PASSWORD:jupiter123}
  workspace-node: ${APP_WORKSPACE_NODE:node02}
  workspace-root: ${APP_WORKSPACE_ROOT:/workspace}
  snapshot-root: ${APP_SNAPSHOT_ROOT:/snapshots}
