services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: jupiter_web
      MARIADB_USER: jupiter
      MARIADB_PASSWORD: jupiter
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./infra/db/docker/initdb:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: infra/api/docker/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: jupiter_web
      DB_USER: jupiter
      DB_PASSWORD: jupiter
      APP_FRONTEND_URL: http://localhost:5173
      APP_API_URL: http://localhost:8080/api
      APP_GATEWAY_URL: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - db

  web:
    build:
      context: apps/web
      dockerfile: ../../infra/web/docker/Dockerfile
    env_file:
      - infra/web/docker/web.env
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mariadb_data:
